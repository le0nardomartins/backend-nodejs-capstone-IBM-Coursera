version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: secondchance-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: secondChance
    volumes:
      - mongo_data:/data/db
    networks:
      - secondchance-network

  backend:
    build: ./secondChance-backend
    container_name: secondchance-backend
    ports:
      - "3060:3060"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - MONGO_DB=secondChance
      - JWT_SECRET=secondchance_jwt_secret_2024
      - PORT=3060
    depends_on:
      - mongodb
    networks:
      - secondchance-network
    volumes:
      - ./secondChance-backend/uploads:/app/uploads

  sentiment:
    build: ./sentiment
    container_name: secondchance-sentiment
    ports:
      - "3070:3070"
    environment:
      - SENTIMENT_PORT=3070
    networks:
      - secondchance-network

  frontend:
    build: ./secondChance-frontend
    container_name: secondchance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - secondchance-network

networks:
  secondchance-network:
    driver: bridge

volumes:
  mongo_data:
